name: Hourly stock notify

on:
  schedule:
    # Hourly while a market your stocks trade on is OPEN (UTC; GitHub cron is UTC).
    # Thailand SET 10:00–16:30 ICT  = 03:00–09:30 UTC
    - cron: '5 3-9 * * 1-5'
    # USA NYSE/Nasdaq 09:30–16:00 ET = 13:30–20:00 UTC
    - cron: '5 13-20 * * 1-5'
    # Add other markets here if you buy them, e.g.:
    #   Tokyo  09:00–15:00 JST = 00:00–06:00 UTC ->  '5 0-6 * * 1-5'
    #   Hong Kong 09:30–16:00 HKT = 01:30–08:00 UTC -> '5 1-8 * * 1-5'
    #   London 08:00–16:30 GMT = 08:00–16:30 UTC ->  '5 8-16 * * 1-5'
    # NOTE: Thai+US hourly ≈ 15 msgs/weekday ≈ 330/month. LINE free tier = 300/month,
    # so it may cap late in the month — add Telegram (unlimited) to never miss one.
  workflow_dispatch: {}   # lets you trigger a test run from the Actions tab anytime

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build digest and send
        run: node notifier/notify.mjs
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # holdings kept private (encrypted secret), never committed to the public repo
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
