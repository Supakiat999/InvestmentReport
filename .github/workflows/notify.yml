name: Hourly stock notify

on:
  # SCHEDULE MOVED to the Cloudflare Worker (notifier/wrangler.jsonc "triggers.crons") on
  # 2026-07-09 so the hourly report includes holdings edited via LINE chat (KV overlay —
  # this workflow reads the static PORTFOLIO_JSON secret and can't see those edits).
  # Do NOT re-add a schedule here while the worker crons exist: every report would send twice.
  # Old schedule for reference: '5 3-9 * * 1-5' (Thai SET) + '5 13-20 * * 1-5' (US), UTC.
  workflow_dispatch: {}   # manual test runs from the Actions tab still work

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build digest and send
        run: node notifier/notify.mjs
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # holdings kept private (encrypted secret), never committed to the public repo
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
